<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 120" fill="none">
  <!-- Altar table (Thronos) -->
  <rect x="65" y="60" width="70" height="45" rx="2" fill="none" stroke="#d4a017" stroke-width="2"/>
  <rect x="65" y="60" width="70" height="45" rx="2" fill="#d4a017" opacity="0.08"/>
  <!-- Altar cloth drape -->
  <path d="M65 60 L65 68 Q100 75 135 68 L135 60" fill="#8B1E2D" opacity="0.2" stroke="#8B1E2D" stroke-width="1"/>
  <!-- Cross on altar front -->
  <g transform="translate(100, 85)">
    <line x1="0" y1="-8" x2="0" y2="8" stroke="#d4a017" stroke-width="2" stroke-linecap="round"/>
    <line x1="-6" y1="-2" x2="6" y2="-2" stroke="#d4a017" stroke-width="2" stroke-linecap="round"/>
  </g>
  <!-- Chalice on altar -->
  <g transform="translate(85, 48)">
    <ellipse cx="0" cy="0" rx="6" ry="3" fill="none" stroke="#d4a017" stroke-width="1.5"/>
    <line x1="0" y1="3" x2="0" y2="10" stroke="#d4a017" stroke-width="1.5"/>
    <ellipse cx="0" cy="11" rx="5" ry="2" fill="none" stroke="#d4a017" stroke-width="1.5"/>
  </g>
  <!-- Paten on altar -->
  <g transform="translate(115, 52)">
    <ellipse cx="0" cy="0" rx="8" ry="3" fill="none" stroke="#d4a017" stroke-width="1.5"/>
    <circle cx="0" cy="-1" r="2" fill="none" stroke="#d4a017" stroke-width="1" opacity="0.6"/>
  </g>
  <!-- Priest figure (with vestments — wider body, cross on chest) -->
  <g transform="translate(100, 10)">
    <circle cx="0" cy="0" r="7" fill="#8B1E2D"/>
    <!-- Vestment body (wider, like a phayno/cope) -->
    <path d="M-12 10 L-10 38 L10 38 L12 10 Q0 8 -12 10 Z" fill="#8B1E2D" opacity="0.85" stroke="#8B1E2D" stroke-width="1"/>
    <!-- Cross on chest -->
    <line x1="0" y1="14" x2="0" y2="26" stroke="#d4a017" stroke-width="2" stroke-linecap="round"/>
    <line x1="-5" y1="18" x2="5" y2="18" stroke="#d4a017" stroke-width="2" stroke-linecap="round"/>
    <!-- Arms raised in blessing -->
    <line x1="-12" y1="14" x2="-20" y2="6" stroke="#8B1E2D" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="12" y1="14" x2="20" y2="6" stroke="#8B1E2D" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  <!-- Large cross above (mounted on wall) -->
  <g transform="translate(160, 20)" opacity="0.4">
    <line x1="0" y1="-12" x2="0" y2="18" stroke="#d4a017" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-8" y1="-2" x2="8" y2="-2" stroke="#d4a017" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  <!-- Candles -->
  <g transform="translate(50, 55)" opacity="0.5">
    <rect x="-2" y="0" width="4" height="20" fill="#d4a017" rx="1"/>
    <ellipse cx="0" cy="-2" rx="3" ry="4" fill="#d4a017" opacity="0.3"/>
  </g>
  <g transform="translate(150, 55)" opacity="0.5">
    <rect x="-2" y="0" width="4" height="20" fill="#d4a017" rx="1"/>
    <ellipse cx="0" cy="-2" rx="3" ry="4" fill="#d4a017" opacity="0.3"/>
  </g>
</svg>
