<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 120" fill="none">
  <!-- Arch/portico -->
  <path d="M30 110 L30 40 Q100 5 170 40 L170 110" stroke="#d4a017" stroke-width="3" fill="none"/>
  <line x1="30" y1="110" x2="170" y2="110" stroke="#d4a017" stroke-width="2"/>
  <!-- Door -->
  <rect x="75" y="55" width="50" height="55" rx="25" ry="25" fill="#f5f1eb" stroke="#d4a017" stroke-width="1.5"/>
  <line x1="100" y1="55" x2="100" y2="110" stroke="#d4a017" stroke-width="1" opacity="0.5"/>
  <!-- People entering (3 simple figures) -->
  <g transform="translate(42, 65)" opacity="0.7">
    <circle cx="0" cy="0" r="5" fill="#666"/>
    <line x1="0" y1="5" x2="0" y2="22" stroke="#666" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="0" y1="12" x2="-6" y2="18" stroke="#666" stroke-width="2" stroke-linecap="round"/>
    <line x1="0" y1="12" x2="6" y2="18" stroke="#666" stroke-width="2" stroke-linecap="round"/>
    <line x1="0" y1="22" x2="-5" y2="34" stroke="#666" stroke-width="2" stroke-linecap="round"/>
    <line x1="0" y1="22" x2="5" y2="34" stroke="#666" stroke-width="2" stroke-linecap="round"/>
  </g>
  <g transform="translate(58, 70)" opacity="0.5">
    <circle cx="0" cy="0" r="4.5" fill="#888"/>
    <line x1="0" y1="5" x2="0" y2="20" stroke="#888" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="0" y1="11" x2="-5" y2="16" stroke="#888" stroke-width="2" stroke-linecap="round"/>
    <line x1="0" y1="11" x2="5" y2="16" stroke="#888" stroke-width="2" stroke-linecap="round"/>
    <line x1="0" y1="20" x2="-4" y2="30" stroke="#888" stroke-width="2" stroke-linecap="round"/>
    <line x1="0" y1="20" x2="4" y2="30" stroke="#888" stroke-width="2" stroke-linecap="round"/>
  </g>
  <!-- Arrow indicating entry -->
  <path d="M50 88 L68 88" stroke="#d4a017" stroke-width="2" stroke-linecap="round"/>
  <path d="M64 84 L70 88 L64 92" stroke="#d4a017" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
