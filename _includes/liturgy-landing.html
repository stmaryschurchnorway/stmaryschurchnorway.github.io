<div class="liturgy-landing" id="liturgyLanding">
  <div class="liturgy-intro-section">
    <h2>Explore Our Sacred Liturgies</h2>
    <p>Journey through the ancient traditions and sacred rituals that form the heart of our worship</p>
  </div>

  <div class="liturgy-grid">
    {% for liturgy in page.liturgies %}
    <div class="liturgy-card" {% if liturgy.url %}onclick="window.location.href='{{ liturgy.url | relative_url }}'"{% else %}onclick="showLiturgy('{{ liturgy.id }}')"{% endif %}>
      <div class="liturgy-card-image">
        <picture>
          <source srcset="{{ liturgy.image | replace: '.png', '.webp' | replace: '.jpg', '.webp' | relative_url }}" type="image/webp">
          <img src="{{ liturgy.image | relative_url }}" alt="{{ liturgy.title }}" loading="lazy" decoding="async">
        </picture>
      </div>
      <div class="liturgy-card-content">
        <h3 class="liturgy-card-title">{{ liturgy.title }}</h3>
        <div class="liturgy-card-malayalam">
          <div class="malayalam-content">
            <span class="malayalam-text">{{ liturgy.malayalam }}</span>
            <span class="transliteration">{{ liturgy.transliteration }}</span>
          </div>
          <button class="liturgy-audio-btn" onclick="event.stopPropagation(); playLiturgyAudio('{{ liturgy.malayalam }}');" title="Listen to pronunciation" aria-label="Play Malayalam pronunciation"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg></button>
        </div>
        <p class="liturgy-card-description">{{ liturgy.description }}</p>
        <button class="liturgy-card-btn" aria-label="Explore {{ liturgy.title }}">
          Explore Journey <span aria-hidden="true">→</span>
        </button>
      </div>
    </div>
    {% endfor %}
  </div>
</div>

<script>
  function playLiturgyAudio(malayalamText) {
    // Use actual audio file for Holy Qurbana
    if (malayalamText === 'വിശുദ്ധ കുർബാന') {
      const audio = new Audio('/assets/audio/vishudha-kurbana.m4a');
      audio.play().catch(error => {
        console.error('Audio playback error:', error);
      });
      return;
    }

    // Fallback to speech synthesis for other texts
    if (!window.speechSynthesis) {
      console.error('Speech Synthesis not supported');
      return;
    }

    window.speechSynthesis.cancel();
    const utterance = new SpeechSynthesisUtterance(malayalamText);
    utterance.lang = 'ml';
    utterance.rate = 0.8;
    utterance.pitch = 1;
    utterance.volume = 1;

    utterance.onerror = function(event) {
      console.error('Audio playback error:', event);
    };

    window.speechSynthesis.speak(utterance);
  }

  window.playLiturgyAudio = playLiturgyAudio;
</script>
