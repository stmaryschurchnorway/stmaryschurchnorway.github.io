- text: "കർത്താവ് എന്റെ ഇടയനാകുന്നു; എനിക്കു മുട്ടുണ്ടാകയില്ല."
  author: "സങ്കീർത്തനം 23:1"

- text: "ഞാൻ തന്നേ വഴിയും സത്യവും ജീവനും ആകുന്നു."
  author: "യോഹന്നാൻ 14:6"

- text: "എന്നെ ശക്തനാക്കുന്നവൻ മുഖാന്തരം ഞാൻ സകലത്തിനും മതിയാകുന്നു."
  author: "ഫിലിപ്പിയർ 4:13"

- text: "ഭയപ്പെടേണ്ടാ, ഞാൻ നിന്നോടുകൂടെ ഉണ്ട്."
  author: "യെശയ്യാവ് 41:10"

- text: "ദൈവം സ്നേഹം ആകുന്നു."
  author: "1 യോഹന്നാൻ 4:8"

- text: "കർത്താവിൽ എപ്പോഴും സന്തോഷിപ്പിൻ; സന്തോഷിപ്പിൻ എന്നു ഞാൻ പിന്നെയും പറയുന്നു."
  author: "ഫിലിപ്പിയർ 4:4"

- text: "അടങ്ങിയിരുന്നു ഞാൻ ദൈവം എന്നു അറിവിൻ."
  author: "സങ്കീർത്തനം 46:10"

- text: "നിങ്ങൾ ലോകത്തിന്റെ വെളിച്ചം ആകുന്നു."
  author: "മത്തായി 5:14"

- text: "വിശ്വാസം, പ്രത്യാശ, സ്നേഹം ഈ മൂന്നും നിലനിൽക്കുന്നു; ഇവയിൽ വലിയതോ സ്നേഹം തന്നേ."
  author: "1 കൊരിന്ത്യർ 13:13"

- text: "കർത്താവിങ്കൽ പ്രത്യാശ വെക്കുന്നവർ ബലം പുതുക്കും; അവർ കഴുകനെപ്പോലെ ചിറകു അടിച്ചുയരും."
  author: "യെശയ്യാവ് 40:31"

- text: "എന്റെ കൃപ നിനക്കു മതി; എന്റെ ശക്തി ബലഹീനതയിൽ തികഞ്ഞുവരുന്നു."
  author: "2 കൊരിന്ത്യർ 12:9"

- text: "സകലബുദ്ധിയേയും കവിയുന്ന ദൈവസമാധാനം നിങ്ങളുടെ ഹൃദയങ്ങളെ കാക്കും."
  author: "ഫിലിപ്പിയർ 4:7"

- text: "ഞാൻ ലോകാവസാനത്തോളം എല്ലാനാളും നിങ്ങളോടുകൂടെ ഉണ്ട്."
  author: "മത്തായി 28:20"

- text: "കർത്താവേ, നിന്റെ വഴികൾ എനിക്കു കാണിച്ചുതരേണമേ; നിന്റെ പാതകൾ എന്നെ പഠിപ്പിക്കേണമേ."
  author: "സങ്കീർത്തനം 25:4"
