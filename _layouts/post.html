---
layout: default
---

<section class="page-banner">
  <h1>{{ page.title }}</h1>
</section>

<article class="page-content">
  <div class="container">
    <p class="post-date">{{ page.date | date: "%B %d, %Y" }}</p>
    {{ content }}
    <div class="post-back">
      <a href="{{ '/' | relative_url }}" class="btn">Back to Home</a>
    </div>
  </div>
</article>
